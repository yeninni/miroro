<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miroro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">MIRORO</p>
      <h1>작게 시작하는 미로 게임</h1>
      <p class="description">
        화살표 키나 WASD로 움직여서 출구까지 도착해보세요.
        새 미로를 만들고, 기록을 확인하면서 조금씩 확장해갈 수 있어요.
      </p>
      <div class="stats">
        <article class="card">
          <span class="label">이동 횟수</span>
          <strong id="moveCount">0</strong>
        </article>
        <article class="card">
          <span class="label">경과 시간</span>
          <strong id="timer">00:00</strong>
        </article>
        <article class="card">
          <span class="label">현재 스테이지</span>
          <strong id="stageLabel">1 / 40</strong>
        </article>
      </div>
      <div class="stage-list" id="stageList" aria-label="스테이지 선택"></div>
      <div class="controls">
        <label class="size-picker" for="mazeSize">스테이지 크기</label>
        <input id="mazeSize" type="range" min="19" max="101" step="2" value="19" disabled>
        <button id="newMazeButton" type="button">현재 스테이지 다시</button>
      </div>
      <button id="nextStageButton" class="next-stage" type="button" hidden>다음 스테이지</button>
      <p id="message" class="message">출발 지점은 왼쪽 위, 출구는 오른쪽 아래예요.</p>
    </section>

    <section class="board-panel">
      <canvas id="mazeCanvas" width="800" height="800" aria-label="미로 게임 보드"></canvas>
      <div class="legend">
        <span><i class="player"></i>플레이어</span>
        <span><i class="goal"></i>출구</span>
        <span><i class="path"></i>길</span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
