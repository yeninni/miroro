<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miroro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">MIRORO</p>
      <h1>작게 시작해 끝없이 커지는 미로 게임</h1>
      <p class="description">
        방향키나 WASD를 길게 눌러 수달을 움직이고 출구까지 도착해 보세요.
        스테이지가 올라갈수록 미로 크기와 테마가 바뀌면서 점점 더 어려워집니다.
      </p>
      <div class="stats">
        <article class="card">
          <span class="label">이동 횟수</span>
          <strong id="moveCount">0</strong>
        </article>
        <article class="card">
          <span class="label">플레이 시간</span>
          <strong id="timer">00:00</strong>
        </article>
        <article class="card">
          <span class="label">현재 스테이지</span>
          <strong id="stageLabel">1 / 40</strong>
        </article>
      </div>
      <div class="stage-list" id="stageList" aria-label="스테이지 선택"></div>
      <div class="controls">
        <label class="size-picker" for="mazeSize">스테이지 크기</label>
        <input id="mazeSize" type="range" min="17" max="55" step="2" value="17" disabled>
        <button id="newMazeButton" type="button">현재 스테이지 다시</button>
      </div>
      <button id="nextStageButton" class="next-stage" type="button" hidden>다음 스테이지</button>
      <p id="message" class="message">출발 지점은 왼쪽 위, 출구는 가장 먼 곳에 열려 있어요.</p>
    </section>

    <section class="board-panel">
      <div id="clearPopup" class="clear-popup" aria-live="polite" hidden>
        <div
          class="clear-popup-otter"
          id="clearPopupOtter"
          data-mood="happy"
          aria-hidden="true"
          style="background-image: url('assets/tilvanian-face.jpg');"
        ></div>
        <p class="clear-popup-text" id="clearPopupText">Great!</p>
      </div>
      <canvas id="mazeCanvas" width="800" height="800" aria-label="미로 게임 보드"></canvas>
      <div class="legend">
        <span><i class="player"></i>플레이어</span>
        <span><i class="goal"></i>출구</span>
        <span><i class="path"></i>길</span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
